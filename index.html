<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Николай Мазенцев — CEO & Founder, Chocofood</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #C9A84C;
      --gold-light: #E2C878;
      --gold-dim: rgba(201,168,76,0.15);
      --bg: #0D0D0D;
      --bg-card: #141414;
      --bg-surface: #1A1A1A;
      --text: #F5F5F5;
      --text-muted: #888;
      --border: rgba(201,168,76,0.2);
    }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 440px;
      padding: 48px 40px 40px;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .card::after {
      content: '';
      position: absolute;
      top: -100px; right: -60px;
      width: 240px; height: 240px;
      background: radial-gradient(circle, var(--gold-dim) 0%, transparent 70%);
      pointer-events: none;
    }
    .monogram {
      width: 64px; height: 64px;
      border: 2px solid var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 28px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    .role {
      font-size: 14px;
      font-weight: 500;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 6px;
    }
    .company {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 32px;
    }
    .divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 24px;
    }
    .contact a {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--text);
      text-decoration: none;
      font-size: 15px;
      padding: 10px 20px;
      border: 1px solid var(--border);
      border-radius: 8px;
      transition: all 0.3s ease;
      background: var(--bg-surface);
    }
    .contact a:hover {
      border-color: var(--gold);
      color: var(--gold);
      background: var(--gold-dim);
    }
    .contact a svg {
      width: 18px; height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="monogram">N</div>
    <h1>Николай Мазенцев</h1>
    <p class="role">CEO & Founder</p>
    <p class="company">Chocofood · Доставка еды · Казахстан</p>
    <div class="divider"></div>
    <div class="contact">
      <a href="mailto:maz@choco.kz">
        <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 4L12 13 2 4"/></svg>
        maz@choco.kz
      </a>
    </div>
  </div>
</body>
</html>
